# NetBeans Ant-based project properties
# These are sourced by nbproject/project.xml's freeform project definition.

# Source directories
src.dir=src/main/java
test.src.dir=src/test/java

# Build output
build.dir=build
classes.dir=${build.dir}/classes
test.classes.dir=${build.dir}/test-classes
reports.dir=${build.dir}/test-reports
lib.dir=${build.dir}/lib

# Fixtures
fixtures.dir=fixtures

# Java
javac.source=21
javac.target=21

# Ant targets
build.target=compile
clean.target=clean
test.target=test
run.target=run
