type: custom:apexcharts-card
header:
  show: true
  title: Predicted Energy Usage
all_series_config:
  stroke_width: 2
series:
  - entity: sensor.hepo_optimization_plan
    name: Predicted Usage
    type: area
    data_generator: |
      const plan = entity.attributes.plan;
      if (!plan) return [];
      return plan.map((entry) => {
        return [new Date(entry.timestamp).getTime(), entry.predicted_usage];
      });
    statistics:
      period: 1hour
    cache: true
    color: rgb(59, 130, 246)
