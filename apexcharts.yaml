type: custom:apexcharts-card
header:
  show: true
  show_states: true
stacked: true
all_series_config:
  stroke_width: 2
span:
  start: hour
graph_span: 12h
series:
  - entity: sensor.hepo_optimization_plan
    name: Pohjakuorma
    type: area
    color: olive
    unit: kW
    data_generator: |
      const plan = entity.attributes.plan;
      if (!plan) return [];
      return plan.map((entry) => {
        return [new Date(entry.timestamp).getTime(), entry.predicted_baseload_kw];
      });
    show:
      in_header: false
  - entity: sensor.hepo_optimization_plan
    name: Maalämpöpumppu
    type: area
    color: blue
    unit: kW
    data_generator: |
      const plan = entity.attributes.plan;
      if (!plan) return [];
      return plan.map((entry) => {
        return [new Date(entry.timestamp).getTime(), entry.planned_gshp_kw];
      });
    show:
      in_header: false
  - entity: sensor.hepo_optimization_plan
    name: Sähköauto (XPZ)
    type: area
    color: purple
    unit: kW
    data_generator: |
      const plan = entity.attributes.plan;
      if (!plan) return [];
      return plan.map((entry) => {
        return [new Date(entry.timestamp).getTime(), entry.planned_ev_kw || 0];
      });
    show:
      in_header: false
  - entity: sensor.hepo_optimization_plan
    name: Sähköauto (Leaf)
    type: area
    color: green
    unit: kW
    data_generator: |
      const plan = entity.attributes.plan;
      if (!plan) return [];
      return plan.map((entry) => {
        return [new Date(entry.timestamp).getTime(), entry.planned_leaf_kw || 0];
      });
    show:
      in_header: false
  - entity: sensor.hepo_optimization_plan
    name: "SARIMA Alaraja (95%)"
    type: line
    color: lightgrey
    stroke_width: 1
    unit: kW
    data_generator: |
      const plan = entity.attributes.plan;
      if (!plan) return [];
      return plan.filter(e => e.sarima_lower_95 !== null).map((entry) => {
        return [new Date(entry.timestamp).getTime(), entry.sarima_lower_95];
      });
    show:
      in_header: false
      legend_value: false
  - entity: sensor.hepo_optimization_plan
    name: "SARIMA Yläraja (95%)"
    type: line
    color: lightgrey
    stroke_width: 1
    unit: kW
    data_generator: |
      const plan = entity.attributes.plan;
      if (!plan) return [];
      return plan.filter(e => e.sarima_upper_95 !== null).map((entry) => {
        return [new Date(entry.timestamp).getTime(), entry.sarima_upper_95];
      });
    show:
      in_header: false
      legend_value: false
  - entity: sensor.hepo_accuracy
    yaxis_id: header_only
    name: Virhe 3h jaksoissa
    color: Grey
    unit: kW
    show:
      legend_value: true
      in_header: true
      in_chart: false
  - entity: sensor.hepo_predicted_24h_usage
    yaxis_id: header_only
    name: 24h ennuste
    color: Grey
    show:
      legend_value: true
      in_header: true
      in_chart: false
